      - heading "Supervised Learning Overview" [level=2] [ref=e71]
      - paragraph [ref=e73]: "In supervised learning, you give the model a training set of input-output pairs. The model learns a function that maps inputs to outputs. There are two main types: regression (predicting continuous values like temperature or price) and classification (predicting categories like spam/not-spam). The model makes a hypothesis — essentially a formula — that takes in features and produces a prediction, and the goal is to make this hypothesis as accurate as possible on new, unseen data."
      - heading "Linear Regression" [level=2] [ref=e74]
      - paragraph [ref=e76]: Linear regression models the relationship between input features and a continuous output as a weighted sum. Each feature gets a weight (coefficient), and the model predicts by multiplying each feature by its weight and adding them up (plus a bias term). The “cost function” measures how wrong the predictions are on average — specifically, it uses the mean squared error between predicted and actual values. The model’s job is to find the weights that minimize this error.
      - heading "Gradient Descent" [level=2] [ref=e77]
      - paragraph [ref=e79]: "Gradient descent is an optimization algorithm that iteratively adjusts the model’s parameters to minimize the cost function. At each step, it calculates the slope (gradient) of the cost function and moves the parameters in the direction that reduces the error. The “learning rate” controls how big each step is — too small and it takes forever, too large and you might overshoot the minimum. There are variants: batch (uses all data per step), stochastic (uses one sample), and mini-batch (uses a small group of samples)."
      - heading "Normal Equation (Closed-Form)" [level=2] [ref=e80]
      - paragraph [ref=e82]: The normal equation is a direct mathematical formula that solves for the optimal weights in one computation, without any iteration. It works by solving a system of linear equations using matrix algebra. The trade-off is that it requires inverting a matrix, which becomes very expensive (slow) when you have many features (more than about 10,000). For smaller problems, it is often simpler than gradient descent because there is no learning rate to tune.
      - heading "Feature Scaling" [level=2] [ref=e83]
      - paragraph [ref=e85]: Feature scaling ensures all input features are on a similar numerical range. Without it, features with larger values dominate the cost function, and gradient descent takes a zigzag path instead of going straight to the minimum. Two common methods are min-max normalisation (rescaling to [0,1]) and standardisation (rescaling so the mean is 0 and standard deviation is 1). This significantly speeds up convergence.
      - heading "Polynomial Regression" [level=2] [ref=e86]
      - paragraph [ref=e88]: When the relationship between inputs and output is not linear, you can add polynomial features (like x squared, x cubed) to capture curved patterns. The model itself is still linear in its parameters — you are just giving it richer features to work with. However, polynomial features can grow very large in magnitude, making feature scaling critical. Higher-degree polynomials risk overfitting if not regularised.
