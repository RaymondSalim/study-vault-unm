      - generic [ref=e88]:
        - generic [ref=e89]: "Depth:"
        - button "ELI10" [active] [ref=e90] [cursor=pointer]
        - button "ELI15" [ref=e91] [cursor=pointer]
        - button "ELI20" [ref=e92] [cursor=pointer]
      - heading "Overview" [level=2] [ref=e93]
      - paragraph [ref=e2542]: Imagine you have a colouring book picture, but you need to figure out which parts belong together. Image segmentation is like using a magic marker to outline groups of similar-looking dots (pixels) in a photo — separating the sky from the trees from the ground. The computer groups together pixels that look alike by colour, brightness, or texture.
      - heading "K-Means Clustering" [level=2] [ref=e123]
      - paragraph [ref=e2544]: K-Means is like sorting your crayons into K piles by colour. You pick K starting colours, then each crayon goes to its closest pile. After sorting, you update each pile’s “average colour.” You keep re-sorting and updating until nothing changes. In images, the “crayons” are pixels and the “piles” become the segments.
      - heading "Gaussian Mixture Models (GMM)" [level=2] [ref=e541]
      - paragraph [ref=e2546]: Instead of forcing every pixel into exactly one group (like K-Means does), GMM says “this pixel is probably 70% sky and 30% cloud.” It uses bell-shaped curves (Gaussians) to describe each group, and each pixel gets a percentage for how much it belongs to each group — like mixing paint colours where you say how much of each colour went in.
      - heading "EM Algorithm for GMM" [level=2] [ref=e814]
      - paragraph [ref=e2548]: The EM algorithm is like a guessing game with two steps you repeat. First (E-step), you guess how much each group “owns” each pixel based on current guesses. Then (M-step), you update your guesses for each group’s centre and spread using those ownership scores. You keep going back and forth until your guesses stop changing — like tuning a radio dial until the signal is clearest.
      - heading "K-Means Optimisation Formulation" [level=2] [ref=e1511]
      - paragraph [ref=e2550]: "K-Means works by solving a puzzle in two alternating steps: first, assign each pixel to its closest group centre; then, move each group centre to the middle of its assigned pixels. Each step makes the total “distance score” smaller, so the answer keeps getting better until it stops changing."
      - heading "GMM Log-Likelihood Objective" [level=2] [ref=e1957]
      - paragraph [ref=e2552]: To train a GMM, we need a way to score how well our bell curves explain the data. The “log-likelihood” is that score — it adds up how well the model predicts each pixel. A higher score means the model fits the data better. The tricky part is that the math involves a “log of a sum” which is hard to solve directly, so we use the EM trick instead.
      - 'heading "EM Algorithm: Conceptual Derivation" [level=2] [ref=e2220]'
      - paragraph [ref=e2554]: "The reason EM works is clever math: since the hard problem (log of a sum) cannot be solved directly, EM introduces a “helper variable” that says which group generated each point. Using this helper, the problem splits into easier pieces. A math rule (Jensen’s inequality) guarantees that solving these easier pieces always improves the overall answer."
      - heading "K-Means vs GMM" [level=2] [ref=e2292]
      - paragraph [ref=e2556]: K-Means is like putting each crayon into exactly one box — simple and fast. GMM is like saying each crayon is partly in several boxes at once — more flexible but slower. K-Means only makes round (spherical) clusters, while GMM can make stretched or tilted clusters. K-Means is actually a special simplified version of GMM.
      - heading "HSV Colour Space for Segmentation" [level=2] [ref=e2466]
      - paragraph [ref=e2558]: "RGB describes colours using three numbers (red, green, blue amounts). HSV is a different way to describe colour: Hue is the actual colour (like “red” or “blue”), Saturation is how vivid it is, and Value is how bright it is. For segmenting by colour, Hue alone captures “what colour” in just one number, which makes clustering much easier."
      - heading "Advanced Segmentation Techniques" [level=2] [ref=e2477]
      - paragraph [ref=e2560]: "There are different levels of “understanding” an image. Semantic segmentation labels every pixel with a category (this pixel is “cat,” that pixel is “sky”). Instance segmentation goes further — it can tell apart cat #1 from cat #2, even if they overlap. Panoptic segmentation combines both: it labels everything and distinguishes individual objects."
      - heading "Key Assumptions and Limitations" [level=2] [ref=e2503]
      - paragraph [ref=e2562]: These methods have some weaknesses. They treat each pixel as independent — they do not know that nearby pixels are usually part of the same object. You also have to tell them how many groups to make (they cannot figure it out on their own), and the answer depends on how you start the process.
