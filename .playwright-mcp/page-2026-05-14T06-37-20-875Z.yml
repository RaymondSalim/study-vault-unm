      - heading "Overview" [level=2] [ref=e93]
      - paragraph [ref=e94]: :::eli15 Image segmentation divides an image into meaningful regions by grouping pixels with similar properties. Simple approaches include thresholding (splitting by brightness) and K-means clustering (grouping pixels into K colour clusters). More advanced methods use probability models (GMMs with EM algorithm) to softly assign pixels to clusters, or deep learning to label every pixel with a semantic class like “car” or “sky.”
      - paragraph [ref=e95]: ":::"
      - paragraph [ref=e96]: :::eli20 Image segmentation partitions an image into meaningful regions by grouping pixels according to local properties (intensity, colour, texture, spectral profiles).
