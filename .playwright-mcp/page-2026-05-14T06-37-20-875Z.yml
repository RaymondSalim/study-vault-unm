      - heading "HSV Colour Space for Segmentation" [level=2] [ref=e2482]
      - paragraph [ref=e2483]: :::eli15 When segmenting images by colour, the HSV colour space is preferred over RGB because the Hue channel encodes colour identity as a single angular value (0-360 degrees), independent of brightness or saturation. In RGB, a colour like “red” is spread across all three channels and changes with lighting. HSV separates chromatic information (H) from intensity (V), making colour-based clustering with K-Means more effective and less sensitive to illumination changes.
      - paragraph [ref=e2484]: ":::"
      - paragraph [ref=e2485]: ":::eli20 Convert RGB → HSV; use Hue channel for clustering:"
      - list [ref=e2486]:
        - listitem [ref=e2487]:
          - strong [ref=e2488]: "H (Hue):"
          - text: represents colour as single angle (0–360°)
        - listitem [ref=e2489]:
          - strong [ref=e2490]: "S (Saturation):"
          - text: colour vividness
        - listitem [ref=e2491]:
          - strong [ref=e2492]: "V (Value):"
          - text: brightness
      - paragraph [ref=e2493]: Hue encodes colour information in one number vs. three in RGB — more representative for colour-based segmentation.
      - paragraph [ref=e2494]: ":::"
      - heading "Advanced Segmentation Techniques" [level=2] [ref=e2495]
      - paragraph [ref=e2496]: :::eli15 Modern deep learning offers three increasingly detailed segmentation tasks. Semantic segmentation assigns a class label to every pixel but cannot distinguish between multiple objects of the same class. Instance segmentation separates individual countable objects (e.g., two different cars). Panoptic segmentation combines both — it handles countable objects with instance labels and uncountable “stuff” regions (sky, grass) with semantic labels.
      - paragraph [ref=e2497]: ":::"
