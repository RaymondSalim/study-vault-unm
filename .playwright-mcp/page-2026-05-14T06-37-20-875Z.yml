      - heading "GMM Log-Likelihood Objective" [level=2] [ref=e1967]
      - paragraph [ref=e1968]: :::eli15 The GMM log-likelihood measures how probable the observed pixel values are under the current model. Since pixels are assumed independent, the joint probability is the product of individual probabilities, and taking the log converts it to a sum. However, each term contains a log of a sum (over mixture components), which has no closed-form maximum. This is why the EM algorithm is needed — it optimises a tractable lower bound instead.
      - paragraph [ref=e1969]: ":::"
