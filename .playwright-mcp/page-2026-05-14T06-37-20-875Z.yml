      - heading "Key Assumptions and Limitations" [level=2] [ref=e2523]
      - paragraph [ref=e2524]: :::eli15 Both K-Means and GMM assume pixels are independent and identically distributed (i.i.d.), which ignores spatial relationships — a pixel’s neighbours give strong clues about its segment, but these methods do not use that information. The number of clusters K must be chosen in advance (a model selection problem with no universal solution). Both methods are sensitive to initialisation and may converge to different solutions depending on starting conditions.
