      - heading "K-Means Clustering" [level=2] [ref=e125]
      - paragraph [ref=e126]: :::eli15 K-Means clustering splits data into K groups by repeatedly assigning each point to its nearest cluster centre, then recalculating each centre as the average of its assigned points. For images, each pixel’s colour (or other feature) is the data point. The algorithm minimises the total squared distance between points and their assigned centres. It always converges but may find only a local optimum depending on initialisation.
