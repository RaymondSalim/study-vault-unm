      - paragraph [ref=e2230]: Direct maximisation is intractable (log of sum) → use EM algorithm.
      - paragraph [ref=e2231]: ":::"
      - 'heading "EM Algorithm: Conceptual Derivation" [level=2] [ref=e2232]'
      - paragraph [ref=e2233]: :::eli15 The EM algorithm works because directly maximising the log-likelihood is intractable due to the log-of-sum structure. By introducing a latent variable (which component generated each point), we can construct a lower bound on the log-likelihood using Jensen’s inequality. EM alternates between tightening this bound (E-step) and maximising it (M-step), guaranteeing monotonic improvement. This same framework underlies Variational Autoencoders.
